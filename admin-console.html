<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>履迹 · 运营后台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin-console.css?v=20260617-admin-open-fix-01">
</head>
<body>
    <div class="admin-shell">
        <header class="admin-header">
            <div>
                <div class="admin-kicker">Admin</div>
                <h1>履迹管理后台</h1>
                <p>看用户、看资料、改权益。</p>
            </div>
            <div class="admin-header-actions">
                <div class="admin-sync-pill" id="admin-sync-pill">实时同步已开启</div>
                <a class="admin-link-btn" href="./index.html">返回主产品</a>
                <button type="button" class="admin-ghost-btn" id="admin-refresh-btn">立即同步</button>
            </div>
        </header>

        <section class="admin-status-card" id="admin-status-card">
            <h2 id="admin-status-title">正在连接独立后台…</h2>
            <p id="admin-status-desc">本地连上就实时可写；没连上时先看快照。</p>
        </section>

        <main class="admin-main" id="admin-main" hidden>
            <section class="admin-control-bar">
                <div class="admin-control-grid">
                    <label class="admin-field admin-field-grow">
                        <span>搜索用户</span>
                        <input id="admin-search-input" type="search" placeholder="搜邮箱、昵称、访客 ID、账号 ID">
                    </label>
                    <label class="admin-field">
                        <span>账号类型</span>
                        <select id="admin-auth-filter">
                            <option value="all">全部</option>
                            <option value="registered">注册账号</option>
                            <option value="guest">体验账号</option>
                        </select>
                    </label>
                    <label class="admin-field">
                        <span>会员状态</span>
                        <select id="admin-membership-filter">
                            <option value="all">全部</option>
                            <option value="trial">试用</option>
                            <option value="monthly">月会员</option>
                            <option value="lifetime">买断</option>
                        </select>
                    </label>
                    <label class="admin-field">
                        <span>资料筛选</span>
                        <select id="admin-asset-filter">
                            <option value="all">全部</option>
                            <option value="has_resume">有简历</option>
                            <option value="has_real_app">有真实投递</option>
                            <option value="has_prepare">有准备</option>
                        </select>
                    </label>
                    <label class="admin-field">
                        <span>时间范围</span>
                        <select id="admin-range-filter">
                            <option value="7">最近 7 天</option>
                            <option value="30" selected>最近 30 天</option>
                            <option value="90">最近 90 天</option>
                        </select>
                    </label>
                    <label class="admin-live-toggle">
                        <input id="admin-live-toggle" type="checkbox" checked>
                        <span>自动实时同步</span>
                    </label>
                </div>
                <div class="admin-bulk-bar">
                    <div class="admin-bulk-meta" id="admin-bulk-meta">已选 0 个账号</div>
                    <div class="admin-bulk-actions">
                        <button type="button" class="admin-action-btn" data-bulk-action="trial">批量 +1 次体验</button>
                        <button type="button" class="admin-action-btn" data-bulk-action="monthly">批量开月卡</button>
                        <button type="button" class="admin-action-btn" data-bulk-action="lifetime">批量买断</button>
                        <button type="button" class="admin-action-btn" data-bulk-action="reset">设回试用</button>
                    </div>
                </div>
            </section>

            <section class="admin-workspace">
                <section class="admin-card admin-card-wide admin-card-users">
                    <div class="admin-card-head">
                        <div>
                            <h2>用户目录</h2>
                            <p>先筛人，再看详情。</p>
                        </div>
                        <div class="admin-card-meta" id="admin-account-meta">--</div>
                    </div>
                    <div class="admin-table-toolbar">
                        <label class="admin-select-all">
                            <input id="admin-select-all" type="checkbox">
                            <span>全选当前筛选结果</span>
                        </label>
                        <div class="admin-last-sync" id="admin-last-sync">最近同步：--</div>
                    </div>
                    <div class="admin-account-list" id="admin-account-list"></div>
                </section>

                <section class="admin-card admin-detail-card">
                    <div class="admin-card-head">
                        <div>
                            <h2>用户档案</h2>
                            <p>一屏看完关键信息。</p>
                        </div>
                    </div>
                    <div class="admin-user-detail" id="admin-user-detail"></div>
                </section>
            </section>

            <section class="admin-overview">
                <section class="admin-card admin-overview-card">
                    <div class="admin-card-head admin-card-head-tight">
                        <div>
                            <h2>简要概览</h2>
                            <p>只留最常用的数据。</p>
                        </div>
                    </div>
                    <div class="admin-metric-grid" id="admin-metric-grid"></div>
                </section>

                <section class="admin-card admin-qr-card">
                    <div class="admin-card-head admin-card-head-tight">
                        <div>
                            <h2>用户共创群二维码</h2>
                            <p>换一次，两边一起生效。</p>
                        </div>
                        <div class="admin-card-meta" id="admin-mode-note">--</div>
                    </div>
                    <div class="admin-qr-single">
                        <div class="admin-qr-preview-shell admin-qr-preview-shell-large">
                            <img id="admin-qr-preview-shared" class="admin-qr-preview" alt="用户共创群二维码预览">
                        </div>
                        <div class="admin-qr-copy">
                            <strong>当前使用中的二维码</strong>
                            <span>适合直接替换群图，不需要再分别维护两个入口。</span>
                        </div>
                        <div class="admin-qr-actions">
                            <button type="button" class="admin-action-btn" data-qr-upload="shared">上传替换</button>
                            <button type="button" class="admin-action-btn" data-style="calm" data-qr-reset="shared">恢复默认</button>
                        </div>
                        <input id="admin-qr-input-shared" type="file" accept="image/*" hidden>
                    </div>
                </section>
            </section>
        </main>
    </div>

    <div class="admin-toast-stack" id="admin-toast-stack" aria-live="polite" aria-atomic="true"></div>

    <script src="ops-dashboard-data.js"></script>
    <script src="rt-runtime-settings.js?v=20260613-runtime-storage-03"></script>
    <script>
        window.RT_ADMIN_LOCAL_CONFIG_READY = fetch('./.admin-console.local.js', { cache: 'no-store' })
            .then(function(response){ return response.ok ? response.text() : ''; })
            .then(function(code){ if(code){ new Function(code)(); } })
            .catch(function(){});
    </script>
    <script src="supabase.js"></script>
    <script src="admin-console.js?v=20260617-admin-open-fix-01"></script>
</body>
</html>
